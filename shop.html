<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop — Matchday Studio</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="page-shop" data-page="shop">
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" class="brand" aria-label="Home">
          <img class="site-logo" src="assets/logo.svg" width="160" height="44" alt="Your store logo" />
        </a>
        <nav class="nav" aria-label="Primary">
          <a href="index.html" data-nav="home">Home</a>
          <a href="shop.html" data-nav="shop">Shop</a>
          <a href="story.html" data-nav="story">Story</a>
          <a href="checkout.html" data-nav="checkout">Checkout</a>
        </nav>
        <a href="bag.html" class="cart-toggle" id="bagLink" aria-label="View shopping bag">
          <span class="cart-label">Bag</span>
          <span class="cart-count" id="cartCount">0</span>
        </a>
      </div>
    </header>

    <main class="main-narrow">
      <header class="page-intro">
        <h1 class="page-title">Shop</h1>
        <p id="catalogStatus" class="page-lede muted">Loading catalog…</p>
      </header>
      <div class="product-grid" id="productGrid"></div>
    </main>

    <footer class="site-footer">
      <p><a href="index.html">Home</a> · <a href="bag.html">Bag</a> · Supabase when configured</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/catalog.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/ui.js"></script>
  </body>
</html>
